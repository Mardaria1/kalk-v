  if (v instanceof Date) return "";

function doGet(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName("Duomenys");
  if (!sheet) return jr({ error: "Sheet not found" });
  var data = sheet.getDataRange().getValues();
  if (data.length <= 1) return jr({ entries: [] });

    var r = data[i];

      hourVal = String(r[1]);

      row: i + 1,

      hour: hourVal, worker: r[2] || "",

function doPost(e) {

function df(a,b){if(a===""||a==null||b===""||b==null)return null;const x=parseFloat(a),y=parseFloat(b);return(isNaN(x)||isNaN(y))?null:x-y}
function pd(n){return n<10?"0"+n:""+n}

function calcSummary(fi){
  const imap=new Map();S.entries.forEach((e,i)=>imap.set(e,i));
  const tQ=fi.reduce((s,e)=>s+(parseFloat(e.quantity)||0),0);
  let tG=0,tE=0;
  fi.forEach(e=>{const i=imap.get(e),prev=i>0?S.entries[i-1]:null;
    if(prev){const g=df(e.gasMeter,prev.gasMeter);if(g!==null)tG+=g;
      EL.forEach(m=>{const d=df(e["el"+m],prev["el"+m]);if(d!==null)tE+=d})}});
  let gP=S.cfg.gp,eP=S.cfg.ep;
  for(let i=fi.length-1;i>=0;i--){if(fi[i].gasPrice){gP=parseFloat(fi[i].gasPrice)||gP;eP=parseFloat(fi[i].elPrice)||eP;break}}
  let sumDry=0,cntDry=0,sumOut=0,cntOut=0;
  fi.forEach(e=>{const d=parseFloat(e.dryerTemp);if(!isNaN(d)){sumDry+=d;cntDry++}const o=parseFloat(e.outdoorTemp);if(!isNaN(o)){sumOut+=o;cntOut++}});
  return{tQ,tG,tE,gP,eP,gC:tG*gP,eC:tE*eP,tC:tG*gP+tE*eP,imap,avgDry:cntDry?sumDry/cntDry:null,avgOut:cntOut?sumOut/cntOut:null};
}

// ── Silo calculator ──
// Cylinder: ø3400 x 4700mm, Cone: ø3400→ø250 x 3450mm, Total H=8150mm
const SILO={cyl_h:4700,cyl_r:1700,cone_h:3450,cone_r_top:1700,cone_r_bot:125,total_h:8150,density:1.4};
function siloVol(pct){
  if(pct<=0)return 0;if(pct>=100)pct=100;
  var h=pct/100*SILO.total_h; // fill height in mm
  var vCone=0,vCyl=0;
  // Cone zone (0 to 3450mm)
  var hc=Math.min(h,SILO.cone_h);
  if(hc>0){
    var rBot=SILO.cone_r_bot,slope=(SILO.cone_r_top-SILO.cone_r_bot)/SILO.cone_h;
    var rTop=rBot+slope*hc;
    vCone=Math.PI/3*hc*(rBot*rBot+rBot*rTop+rTop*rTop); // mm³
  }
  // Cylinder zone (3450 to 8150mm)
  if(h>SILO.cone_h){
    var hCyl=Math.min(h-SILO.cone_h,SILO.cyl_h);
    vCyl=Math.PI*SILO.cyl_r*SILO.cyl_r*hCyl; // mm³
  }
  return(vCone+vCyl)/1e9; // m³
}
function siloTons(pct){return siloVol(pct)*S.cfg.dn}
function siloDiff(before,after){
  var b=parseFloat(before),a=parseFloat(after);
  if(isNaN(b)||isNaN(a))return null;
  return siloTons(a)-siloTons(b); // produced = after - before (level rises)
}

  var d=siloDiff(s1.value,s2.value);

}

function drawCharts(){
  if(S.view!=="charts")return;
  const fi=filt(S.entries);if(fi.length<2)return;
  const sm=calcSummary(fi);

  // Aggregate by day
  const days={};
  fi.forEach(e=>{
    const i=sm.imap.get(e),prev=i>0?S.entries[i-1]:null;
    const gd=prev?df(e.gasMeter,prev.gasMeter):0;
    let ed=0;if(prev)EL.forEach(m=>{const d=df(e["el"+m],prev["el"+m]);if(d)ed+=d});
    if(!days[e.date])days[e.date]={qty:0,gas:0,el:0,temps:[],n:0};
    const day=days[e.date];
    day.qty+=parseFloat(e.quantity)||0;
    day.gas+=gd||0;
    day.el+=ed;
    const ot=parseFloat(e.outdoorTemp);if(!isNaN(ot))day.temps.push(ot);
    day.n++;
  });

  const dayKeys=Object.keys(days).sort();
  const labels=dayKeys.map(d=>{var p=d.split("-");return p[1]+"-"+p[2]});
  const qtyD=dayKeys.map(d=>days[d].qty);
  const gasPerT=dayKeys.map(d=>days[d].qty>0?Math.round(days[d].gas/days[d].qty):null);
  const costPerT=dayKeys.map(d=>{
    if(days[d].qty<=0)return null;
    return+(( days[d].gas*sm.gP + days[d].el*sm.eP ) / days[d].qty).toFixed(2);
  });

  // Scatter: gas per ton vs avg daily outdoor temp (aggregated by day)
  const scatter=[];
  dayKeys.forEach(d=>{
    const day=days[d];
    if(day.qty>0&&day.temps.length>0){
      const avgTemp=day.temps.reduce((a,b)=>a+b,0)/day.temps.length;
      const gasPerTon=day.gas/day.qty;
      scatter.push({x:+avgTemp.toFixed(1),y:+gasPerTon.toFixed(0),label:d.slice(5)});
    }
  });

  Object.values(charts).forEach(c=>c.destroy());charts={};
  const xAxis={grid:{color:"rgba(255,255,255,.06)"},ticks:{color:"#8b8fa7",font:{family:"DM Sans",size:10},maxRotation:45,minRotation:45}};
  const yAxis={grid:{color:"rgba(255,255,255,.06)"},ticks:{color:"#8b8fa7",font:{family:"DM Sans",size:10}}};

  // 1. Production per day
  charts.prod=new Chart($("#chProd"),{type:"bar",data:{labels,datasets:[{label:"t",data:qtyD,backgroundColor:"rgba(59,130,246,.6)",borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:xAxis,y:{...yAxis,beginAtZero:true}}}});

  // 2. Gas per ton (efficiency)
  charts.gasPerT=new Chart($("#chGasPerT"),{type:"line",data:{labels,datasets:[{label:"Dujos/t",data:gasPerT,borderColor:"#f59e0b",backgroundColor:"rgba(245,158,11,.1)",fill:true,tension:.3,pointRadius:4,pointBackgroundColor:"#f59e0b",spanGaps:true}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:xAxis,y:yAxis}}});

  // 3. Cost per ton
  charts.costPerT=new Chart($("#chCostPerT"),{type:"line",data:{labels,datasets:[{label:"\u20AC/t",data:costPerT,borderColor:"#8b5cf6",backgroundColor:"rgba(139,92,246,.1)",fill:true,tension:.3,pointRadius:4,pointBackgroundColor:"#8b5cf6",spanGaps:true}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:xAxis,y:yAxis}}});

  // 4. Gas vs outdoor temp (scatter)
  charts.scatter=new Chart($("#chScatter"),{type:"scatter",data:{datasets:[{label:"Dujos/t",data:scatter,backgroundColor:"rgba(245,158,11,.7)",pointRadius:6,pointHoverRadius:8}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.raw.label+": "+c.raw.x+"\u00B0C, "+c.raw.y+" dujos/t"}}}},scales:{x:{...yAxis,title:{display:true,text:"Vid. lauko \u00B0C",color:"#8b8fa7",font:{family:"DM Sans",size:11}}},y:{...yAxis,title:{display:true,text:"Dujos / t",color:"#8b8fa7",font:{family:"DM Sans",size:11}}}}}});
}

// ── PDF ──
function genPDF(){
  const fi=filt(S.entries);if(!fi.length){toast("N\u0117ra duomen\u0173","fail");return}
  const sm=calcSummary(fi);
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"landscape"});
  const pw=doc.internal.pageSize.getWidth();

  // Header
  doc.setFontSize(18);doc.setFont("helvetica","bold");
  doc.text("KALK V Gamybos Ataskaita",14,18);
  doc.setFontSize(10);doc.setFont("helvetica","normal");doc.setTextColor(100);
  doc.text("UAB Mortar Akmene",14,25);
  const range=gfr(S.fl);
  doc.text("Laikotarpis: "+(range.a||"...")+"\u2014"+(range.b||"..."),14,31);
  doc.text("Sugeneruota: "+new Date().toLocaleString("lt-LT"),14,37);

  // Summary
  doc.setFontSize(12);doc.setFont("helvetica","bold");doc.setTextColor(0);
  doc.text("Suvestine",14,48);
  doc.autoTable({startY:52,theme:"grid",headStyles:{fillColor:[59,130,246]},
    head:[["Rodiklis","Reiksme"]],
    body:[
      ["Pagaminta",sm.tQ.toFixed(1)+" t"],
      ["Duju suvartojimas",Math.round(sm.tG).toString()],
      ["Duju kaina","\u20AC"+sm.gC.toFixed(2)+" (\u20AC"+sm.gP.toFixed(2)+"/vnt)"],
      ["Elektros suvartojimas",Math.round(sm.tE)+" kWh"],
      ["Elektros kaina","\u20AC"+sm.eC.toFixed(2)+" (\u20AC"+sm.eP.toFixed(3)+"/kWh)"],
      ["Viso kaina","\u20AC"+sm.tC.toFixed(2)],
      ["Kaina / t",sm.tQ>0?"\u20AC"+(sm.tC/sm.tQ).toFixed(2):"\u2014"],
      ["Irasu skaicius",fi.length.toString()]
    ],margin:{left:14},tableWidth:120});

  // Data table
  const tableY=doc.lastAutoTable.finalY+12;
  doc.setFontSize(12);doc.setFont("helvetica","bold");
  doc.text("Duomenys",14,tableY);

  const tHead=[["Data","Val.","Darb.","Kiekis","Duju sk.","D.\u0394",...EL.map(m=>"El."+m),"Dz.\u00B0C","L.\u00B0C"]];
  const tBody=fi.map(e=>{
    const i=sm.imap.get(e),prev=i>0?S.entries[i-1]:null;
    const gd=prev?df(e.gasMeter,prev.gasMeter):null;
    return[e.date,e.hour||"",e.worker||"",e.quantity||"",e.gasMeter||"",gd!==null?gd:"",
      ...EL.map(m=>e["el"+m]||""),e.dryerTemp||"",e.outdoorTemp||""];
  });

  doc.autoTable({startY:tableY+4,theme:"striped",headStyles:{fillColor:[59,130,246],fontSize:7},bodyStyles:{fontSize:7},head:tHead,body:tBody,margin:{left:14}});

  doc.save("KALK_V_ataskaita_"+td()+".pdf");
  toast("\u2705 PDF sugeneruotas!");
}

// ── Settings ──
function rCfg(){return'<div class="card"><h2>\u2699\uFE0F Nustatymai</h2><div class="slbl sg"><span class="si">\uD83D\uDD25</span> Duj\u0173 kaina</div><div class="fg"><div class="f"><label>\u20AC u\u017E vnt.</label><input type="number" step="0.01" id="cg" value="'+S.cfg.gp+'"></div></div><div class="slbl se"><span class="si">\u26A1</span> Elektros kaina</div><div class="fg"><div class="f"><label>\u20AC u\u017E kWh</label><input type="number" step="0.001" id="ce" value="'+S.cfg.ep+'"></div></div><div class="slbl" style="color:#8b5cf6;background:rgba(139,92,246,.08)"><span class="si">\uD83C\uDFED</span> Silosas</div><div class="fg"><div class="f"><label>Med\u017Eiagos tankis, t/m\u00B3</label><input type="number" step="0.01" id="cdn" value="'+S.cfg.dn+'"></div></div><div class="slbl sst"><span class="si">\uD83D\uDD17</span> Google Sheets</div><div class="f" style="margin-bottom:12px"><label>Script URL</label><input type="text" id="cu" value="'+S.url+'" style="font-family:var(--mono);font-size:.78rem"></div><button class="bss" onclick="sCfg()">\uD83D\uDCBE I\u0161saugoti</button><div style="text-align:center"><button class="bdc" onclick="reset()">\uD83D\uDDD1\uFE0F Atjungti</button></div></div>'}
function sCfg(){S.cfg={gp:parseFloat($("#cg").value)||0,ep:parseFloat($("#ce").value)||0,dn:parseFloat($("#cdn").value)||1.4};localStorage.setItem("kv_cfg",JSON.stringify(S.cfg));const u=$("#cu").value.trim();if(u&&u!==S.url){S.url=u;localStorage.setItem("kv_url",u);load()}toast("\u2705 I\u0161saugota!")}
function reset(){if(confirm("Atjungti?")){S.url="";S.entries=[];localStorage.removeItem("kv_url");R()}}

// ── Render ──
function R(){
  const a=$("#app");if(!S.url){a.innerHTML=rSetup();return}
  let h='<div class="app"><div class="header"><div class="header-left"><h1>KALK V Gamyba</h1><div class="sub">UAB Mortar Akmen\u0117</div></div><div class="badge"><div class="dot"></div>Sheets</div></div>';
  h+='<div class="nav"><button class="'+(S.view==="form"?"active":"")+'" onclick="S.view=\'form\';R()">\u270F\uFE0F \u012Evedimas</button>';
  h+='<button class="'+(S.view==="table"?"active":"")+'" onclick="S.view=\'table\';R()">\uD83D\uDCCB Duomenys</button>';
  h+='<button class="'+(S.view==="charts"?"active":"")+'" onclick="S.view=\'charts\';R()">\uD83D\uDCC8 Ataskaitos</button>';
  h+='<button class="'+(S.view==="settings"?"active":"")+'" onclick="S.view=\'settings\';R()">\u2699\uFE0F Nust.</button></div>';
  if(S.view==="form")h+=rForm();
  if(S.view==="table")h+=rTable();
  if(S.view==="charts")h+=rCharts();
  if(S.view==="settings")h+=rCfg();
  a.innerHTML=h+"</div>";
  if(S.view==="charts")setTimeout(drawCharts,50);
}

R();if(S.url)load();getWeather().then(()=>{if(S.view==="form")R()});
setInterval(()=>{getWeather().then(()=>{if(S.view==="form")R()})},1800000);
</script>

<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>KALK V Gamyba</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface-2:#232735;--border:#2d3244;--text:#e4e6ef;--text-muted:#8b8fa7;--accent:#3b82f6;--accent-hover:#2563eb;--gas:#f59e0b;--gas-bg:rgba(245,158,11,.08);--elec:#06b6d4;--elec-bg:rgba(6,182,212,.08);--temp:#10b981;--temp-bg:rgba(16,185,129,.08);--diff:#a78bfa;--danger:#ef4444;--ok:#10b981;--ok-bg:rgba(16,185,129,.12);--fail-bg:rgba(239,68,68,.12);--radius:10px;--font:'DM Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100dvh}
.app{max-width:920px;margin:0 auto;padding:16px;padding-bottom:100px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px}
.header-left h1{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--elec));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-left .sub{color:var(--text-muted);font-size:.78rem;margin-top:2px}
.badge{display:flex;align-items:center;gap:6px;background:var(--ok-bg);color:var(--ok);padding:5px 12px;border-radius:20px;font-size:.72rem;font-weight:600}
.dot{width:7px;height:7px;background:var(--ok);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav{display:flex;gap:3px;background:var(--surface);border-radius:var(--radius);padding:4px;margin-bottom:16px}
.nav button{flex:1;padding:9px 4px;border:none;background:none;color:var(--text-muted);font-family:var(--font);font-size:.76rem;font-weight:600;border-radius:7px;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav button.active{background:var(--accent);color:#fff}
.card{background:var(--surface);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:16px}
.card h2{font-size:1rem;font-weight:700;margin-bottom:14px}
.slbl{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px;padding:7px 12px;border-radius:7px;display:flex;align-items:center;gap:6px}
.si{font-size:.95rem}
.sg{color:var(--gas);background:var(--gas-bg)}.se{color:var(--elec);background:var(--elec-bg)}.st{color:var(--temp);background:var(--temp-bg)}.ss{color:var(--diff);background:rgba(167,139,250,.08)}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;align-items:end}
.mg{grid-template-columns:repeat(auto-fill,minmax(95px,1fr))}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.f input,.f select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:7px;font-family:var(--mono);font-size:.92rem;width:100%;transition:border-color .2s;outline:none}
.f input[type=text],.f input[type=date],.f input[type=time]{font-family:var(--font)}
.f input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.f input.af{border-color:var(--temp);background:rgba(16,185,129,.05)}
.at{font-size:.6rem;color:var(--temp);font-weight:600;margin-left:3px}
.calc{display:flex;flex-direction:column;gap:2px;padding:8px 12px;background:rgba(167,139,250,.08);border-radius:7px;border:1px dashed var(--diff)}
.calc .cl{font-size:.68rem;color:var(--diff);text-transform:uppercase;font-weight:600}
.calc .cv{font-family:var(--mono);font-size:1.05rem;font-weight:600;color:var(--diff)}
.bsv{width:100%;margin-top:18px;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:.92rem;font-weight:700;cursor:pointer;transition:all .2s}
.bsv:hover{background:var(--accent-hover)}.bsv:active{transform:scale(.98)}.bsv:disabled{opacity:.6;cursor:not-allowed}
.bsv.edit-mode{background:var(--gas)}
.bcan{padding:14px;background:none;border:1px solid var(--danger);color:var(--danger);border-radius:var(--radius);font-family:var(--font);font-size:.92rem;font-weight:700;cursor:pointer;margin-top:8px;width:100%}
.tw{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.ts{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.76rem;white-space:nowrap}
thead th{background:var(--surface-2);padding:8px 8px;text-align:right;font-size:.66rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border);position:sticky;top:0}
thead th:first-child{text-align:left}
td{padding:7px 8px;text-align:right;font-family:var(--mono);font-size:.78rem;border-bottom:1px solid var(--border)}
td:first-child{text-align:left;font-family:var(--font);font-weight:600}
tr:last-child td{border-bottom:none}
tr:hover{background:rgba(59,130,246,.04)}
.dc{color:var(--diff);font-weight:600}
.wc{font-family:var(--font);color:var(--text-muted)}
.sc{position:sticky;left:0;background:var(--surface);z-index:1}
thead .sc{background:var(--surface-2);z-index:2}
.ac{text-align:center!important;white-space:nowrap}
.bi{background:none;border:none;cursor:pointer;font-size:.8rem;padding:3px;opacity:.5;transition:opacity .15s}
.bi:hover{opacity:1}
.sgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.stt{background:var(--bg);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:3px}
.stt .sl{font-size:.66rem;color:var(--text-muted);text-transform:uppercase;font-weight:600}
.stt .sv{font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--accent)}
.fb{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.fc{padding:6px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-family:var(--font);font-size:.73rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.fc.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.fc:hover{border-color:var(--accent)}
.cr{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.cr input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:var(--font);font-size:.8rem;outline:none}
.cr span{color:var(--text-muted);font-size:.8rem}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:.85rem;font-weight:600;z-index:1000;animation:su .3s ease;pointer-events:none}
.toast.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok)}
.toast.fail{background:var(--fail-bg);color:var(--danger);border:1px solid var(--danger)}
@keyframes su{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.es{text-align:center;padding:40px 20px;color:var(--text-muted)}.es .icon{font-size:2.5rem;margin-bottom:10px}
.setup{max-width:600px;margin:0 auto;padding:20px}
.setup-header{text-align:center;padding:30px 0 20px}.setup-icon{font-size:2.5rem;margin-bottom:8px}.setup-header h1{font-size:1.4rem;font-weight:700}.setup-header p{color:var(--text-muted);font-size:.85rem;margin-top:4px}
.si2{display:flex;justify-content:center;gap:12px;margin-bottom:24px}
.sd{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;background:var(--surface);color:var(--text-muted);border:2px solid var(--border);transition:all .3s}
.sd.a{border-color:var(--accent);color:var(--accent)}.sd.c{background:var(--accent);color:#fff;border-color:var(--accent)}
.ss2{background:var(--surface);border-radius:var(--radius);padding:24px;border:1px solid var(--border);animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ss2 h2{font-size:1.05rem;font-weight:700;margin-bottom:14px}
.ins{color:var(--text-muted);font-size:.88rem;line-height:1.6}.ins p{margin-bottom:8px}.ins strong{color:var(--text)}.ins a{color:var(--accent)}.ins ol{padding-left:20px;margin:8px 0}.ins li{margin-bottom:4px}
.cb{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin:12px 0}
.ch{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface-2);border-bottom:1px solid var(--border)}
.ch span{font-size:.72rem;color:var(--text-muted);font-weight:600;text-transform:uppercase}
.bcp{background:var(--accent);color:#fff;border:none;padding:4px 12px;border-radius:5px;font-size:.75rem;font-weight:600;cursor:pointer;font-family:var(--font)}
.bcp.ok{background:var(--ok)}
.cc{padding:12px;font-family:var(--mono);font-size:.73rem;color:var(--text-muted);overflow-x:auto;white-space:pre;line-height:1.5;max-height:300px;overflow-y:auto}
.hp{display:flex;flex-wrap:wrap;gap:6px;white-space:normal}
.hc{background:var(--surface-2);padding:3px 8px;border-radius:4px;font-size:.72rem}
.tip{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--gas);padding:10px 14px;border-radius:8px;font-size:.82rem;margin:12px 0}
.ui{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;font-family:var(--mono);font-size:.85rem;outline:none;margin-bottom:10px}
.ui:focus{border-color:var(--accent)}
.bt{width:100%;padding:10px;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:.85rem;font-weight:600;cursor:pointer;margin-bottom:10px}
.tr{padding:10px;border-radius:8px;font-size:.85rem;font-weight:600;margin-bottom:10px;text-align:center}
.tr.ok{background:var(--ok-bg);color:var(--ok)}.tr.fail{background:var(--fail-bg);color:var(--danger)}
.br{display:flex;gap:10px;margin-top:14px}
.bn{flex:1;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:.9rem;font-weight:700;cursor:pointer}
.bn:disabled{opacity:.4;cursor:not-allowed}
.bb{padding:12px 20px;background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;font-family:var(--font);font-size:.85rem;cursor:pointer}
.bss{width:100%;padding:12px;background:var(--ok);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:.9rem;font-weight:700;cursor:pointer;margin-top:8px}
.bdc{background:none;border:none;color:var(--text-muted);font-family:var(--font);font-size:.75rem;cursor:pointer;padding:8px;margin-top:20px}
.bdc:hover{color:var(--danger)}
@media(max-width:500px){.app{padding:10px;padding-bottom:80px}.fg{grid-template-columns:1fr 1fr}.mg{grid-template-columns:repeat(3,1fr)}.df{grid-column:1/-1}.sgr{grid-template-columns:1fr 1fr}.f input{padding:12px 10px;font-size:1rem}.header-left h1{font-size:1.1rem}.nav button{font-size:.7rem;padding:8px 2px}.fc{padding:5px 9px;font-size:.7rem}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const EL=["480","380","183","184","182","181"],VL=56.35,VN=22.30;
const SH="Data\tValanda\tDarbuotojas\tKiekis_t\tDuju_skaitiklis\tEl_480\tEl_380\tEl_183\tEl_184\tEl_182\tEl_181\tDziovykles_temp\tLauko_temp\tDuju_kaina\tEl_kaina\tTimestamp";

const AS=`function doGet(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName("Duomenys");
  if (!sheet) return jr({ error: "Sheet not found" });
  var data = sheet.getDataRange().getValues();
  if (data.length <= 1) return jr({ entries: [] });
  var entries = [];
  for (var i = 1; i < data.length; i++) {
    var r = data[i];
    if (!r[0]) continue;
    entries.push({
      row: i + 1,
      date: Utilities.formatDate(new Date(r[0]), "Europe/Vilnius", "yyyy-MM-dd"),
      hour: r[1]||"", worker: r[2]||"", quantity: r[3]||"",
      gasMeter: r[4]||"",
      el480: r[5]||"", el380: r[6]||"", el183: r[7]||"",
      el184: r[8]||"", el182: r[9]||"", el181: r[10]||"",
      dryerTemp: r[11]||"", outdoorTemp: r[12]||"",
      gasPrice: r[13]||"", elPrice: r[14]||""
    });
  }
  return jr({ entries: entries });
}

function doPost(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName("Duomenys");
  if (!sheet) return jr({ error: "Sheet not found" });
  var d = JSON.parse(e.postData.contents);

  if (d.action === "delete") {
    if (d.row > 1) sheet.deleteRow(d.row);
    return jr({ success: true });
  }

  if (d.action === "edit") {
    var vals = [[d.date, d.hour, d.worker,
      d.quantity, d.gasMeter,
      d.el480, d.el380, d.el183, d.el184, d.el182, d.el181,
      d.dryerTemp, d.outdoorTemp, d.gasPrice, d.elPrice]];
    sheet.getRange(d.row, 1, 1, 15).setValues(vals);
    return jr({ success: true });
  }

  sheet.appendRow([
    d.date, d.hour, d.worker, d.quantity, d.gasMeter,
    d.el480, d.el380, d.el183, d.el184, d.el182, d.el181,
    d.dryerTemp, d.outdoorTemp, d.gasPrice, d.elPrice,
    new Date()
  ]);
  return jr({ success: true });
}

function jr(o) {
  return ContentService.createTextOutput(JSON.stringify(o))
    .setMimeType(ContentService.MimeType.JSON);
}`;

let S={
  url:localStorage.getItem("kv_url")||"",
  entries:[],view:"form",saving:false,step:1,
  lastW:localStorage.getItem("kv_w")||"",
  lastD:localStorage.getItem("kv_d")||"",
  oTemp:null,
  cfg:JSON.parse(localStorage.getItem("kv_cfg")||"null")||{gp:0.57,ep:0.20},
  fl:"month",ff:"",ft:"",
  editEntry:null
};

function $(s){return document.querySelector(s)}
function td(){return new Date().toISOString().split("T")[0]}
function nt(){return new Date().toTimeString().slice(0,5)}
function fm(n){if(n===null||n===undefined||n==="")return"\u2014";return typeof n==="number"?n.toLocaleString("lt-LT"):n}
function df(a,b){if(a===""||a==null||b===""||b==null)return null;const x=parseFloat(a),y=parseFloat(b);return(isNaN(x)||isNaN(y))?null:x-y}
function pd(n){return n<10?"0"+n:""+n}
function fd(d){return d.getFullYear()+"-"+pd(d.getMonth()+1)+"-"+pd(d.getDate())}

function cp(text,btn){
  try{const t=document.createElement("textarea");t.value=text;t.style.cssText="position:fixed;left:-9999px";document.body.appendChild(t);t.focus();t.select();document.execCommand("copy");document.body.removeChild(t);btn.textContent="\u2713 Nukopijuota!";btn.classList.add("ok");setTimeout(()=>{btn.textContent="\uD83D\uDCCB Kopijuoti";btn.classList.remove("ok")},2000)}catch(e){window.prompt("Ctrl+C:",text)}
}
function toast(m,t){const e=document.createElement("div");e.className="toast "+(t||"ok");e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}

async function getWeather(){
  try{const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude="+VL+"&longitude="+VN+"&current_weather=true&timezone=Europe%2FVilnius");const d=await r.json();if(d.current_weather)S.oTemp=d.current_weather.temperature}catch(e){}
}

function gfr(k){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth(),d=n.getDate(),dow=n.getDay()||7;
  switch(k){
    case"today":return{a:td(),b:td()};
    case"week":{const a=new Date(y,m,d-dow+1),b=new Date(y,m,d-dow+7);return{a:fd(a),b:fd(b)}}
    case"month":return{a:y+"-"+pd(m+1)+"-01",b:fd(new Date(y,m+1,0))};
    case"lastmonth":return{a:(m===0?y-1:y)+"-"+pd(m===0?12:m)+"-01",b:fd(new Date(y,m,0))};
    case"year":return{a:y+"-01-01",b:y+"-12-31"};
    case"lastyear":return{a:(y-1)+"-01-01",b:(y-1)+"-12-31"};
    case"all":return{a:"",b:""};
    case"custom":return{a:S.ff,b:S.ft};
    default:return{a:"",b:""}
  }
}
function filt(arr){const r=gfr(S.fl);if(!r.a&&!r.b)return arr;return arr.filter(e=>{if(!e.date)return false;if(r.a&&e.date<r.a)return false;if(r.b&&e.date>r.b)return false;return true})}

// ── API ──
async function load(){
  if(!S.url)return;
  try{const r=await fetch(S.url,{redirect:"follow"});const t=await r.text();const d=JSON.parse(t);
    if(d.entries){S.entries=d.entries;
    if(S.entries.length>0){const l=S.entries[S.entries.length-1];S.lastW=l.worker||S.lastW;S.lastD=l.dryerTemp||S.lastD}
    R()}}catch(e){toast("Nepavyko gauti duomen\u0173","fail")}
}

async function post(payload){
  try{await fetch(S.url,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});return true}catch(e){return false}
}

async function saveNew(d){
  S.saving=true;R();
  d.gasPrice=S.cfg.gp;d.elPrice=S.cfg.ep;
  if(await post(d)){S.lastW=d.worker;S.lastD=d.dryerTemp;localStorage.setItem("kv_w",d.worker);localStorage.setItem("kv_d",d.dryerTemp);toast("\u2705 I\u0161saugota!");await load()}else{toast("\u274C Klaida","fail")}
  S.saving=false;R();
}

async function saveEdit(d){
  S.saving=true;R();
  d.action="edit";d.gasPrice=d.gasPrice||S.cfg.gp;d.elPrice=d.elPrice||S.cfg.ep;
  if(await post(d)){toast("\u2705 Atnaujinta!");S.editEntry=null;await load()}else{toast("\u274C Klaida","fail")}
  S.saving=false;R();
}

async function deleteEntry(row){
  if(!confirm("Ar tikrai i\u0161trinti \u0161\u012F \u012Fra\u0161\u0105?"))return;
  if(await post({action:"delete",row:row})){toast("\u2705 I\u0161trinta!");await load()}else{toast("\u274C Klaida","fail")}
}

// ── Setup ──
function rSetup(){
  const s=S.step;
  let h='<div class="setup"><div class="setup-header"><div class="setup-icon">\u2699\uFE0F</div><h1>Konfig\u016Bracija</h1><p>Sujungsime su Google Sheets per 3 \u017Eingsnius</p></div>';
  h+='<div class="si2">'+[1,2,3].map(n=>'<div class="sd '+(s>=n?"a":"")+" "+(s===n?"c":"")+'">'+(s>n?"\u2713":n)+"</div>").join("")+"</div>";

  if(s===1){h+='<div class="ss2"><h2>1. Sukurk Google Sheet</h2><div class="ins"><p>Eik \u012F <a href="https://sheets.google.com" target="_blank">sheets.google.com</a>, sukurk nauj\u0105 spreadsheet.</p><p>Pervadink lap\u0105 \u012F <strong>Duomenys</strong>. \u012E A1 \u012Fklijuok:</p></div>';
  h+='<div class="cb"><div class="ch"><span>Stulpeliai</span><button class="bcp" onclick="cp(SH,this)">\uD83D\uDCCB Kopijuoti</button></div><div class="cc hp">'+SH.split("\t").map(x=>'<span class="hc">'+x+"</span>").join("")+"</div></div>";
  h+='<div class="tip">\uD83D\uDCA1 Spausk Kopijuoti \u2192 Google Sheet A1 \u2192 Ctrl+V</div><button class="bn" onclick="S.step=2;R()">Toliau \u2192</button></div>'}

  if(s===2){h+='<div class="ss2"><h2>2. Apps Script</h2><div class="ins"><p><strong>Extensions \u2192 Apps Script</strong> \u2192 i\u0161trink sen\u0105 kod\u0105, \u012Fklijuok:</p></div>';
  h+='<div class="cb"><div class="ch"><span>Kodas</span><button class="bcp" onclick="cp(AS,this)">\uD83D\uDCCB Kopijuoti</button></div><pre class="cc">'+AS.replace(/</g,"&lt;")+"</pre></div>";
  h+='<div class="ins" style="margin-top:16px"><ol><li><strong>Deploy \u2192 New deployment</strong></li><li>Type: <strong>Web app</strong></li><li>Execute as: <strong>Me</strong>, Access: <strong>Anyone</strong></li><li><strong>Deploy</strong> \u2192 Authorize \u2192 Kopijuok URL</li></ol></div>';
  h+='<div class="tip">\u26A0\uFE0F Jei atnaujini — <strong>Deploy \u2192 Manage deployments \u2192 Edit \u2192 Version: New \u2192 Deploy</strong></div>';
  h+='<div class="br"><button class="bb" onclick="S.step=1;R()">\u2190</button><button class="bn" onclick="S.step=3;R()">Turiu URL \u2192</button></div></div>'}

  if(s===3){h+='<div class="ss2"><h2>3. Script URL</h2><input type="url" class="ui" id="sUrl" placeholder="https://script.google.com/macros/s/.../exec">';
  h+='<button class="bt" onclick="tUrl()">\uD83D\uDD17 Testuoti</button><div id="tR"></div>';
  h+='<button class="bt" id="bSk" style="display:none;border-color:var(--gas);color:var(--gas)" onclick="finish()">\u23ED Praleisti test\u0105</button>';
  h+='<div class="br"><button class="bb" onclick="S.step=2;R()">\u2190</button><button class="bn" onclick="finish()">\uD83D\uDE80 Prad\u0117ti</button></div></div>'}
  return h+"</div>";
}

async function tUrl(){
  const u=$("#sUrl").value.trim();if(!u)return;$("#tR").innerHTML="";
  try{const r=await fetch(u,{redirect:"follow"});const d=JSON.parse(await r.text());
    $("#tR").innerHTML=d.entries!==undefined?'<div class="tr ok">\u2705 Veikia!</div>':'<div class="tr fail">\u274C Blogas atsakymas</div>'}
  catch(e){$("#tR").innerHTML='<div class="tr fail">\u274C Nepavyko. Jei nar\u0161ykl\u0117je URL veikia, spausk Praleisti.</div>';$("#bSk").style.display="block"}
}

function finish(){const el=$("#sUrl");const u=el?el.value.trim():S.url;if(!u)return;S.url=u;localStorage.setItem("kv_url",u);R();load()}

// ── Form ──
function rForm(){
  const ed=S.editEntry;
  const w=ed?ed.worker:S.lastW;
  const dr=ed?ed.dryerTemp:S.lastD;
  const oT=ed?ed.outdoorTemp:(S.oTemp!==null?S.oTemp:"");
  const dt=ed?ed.date:td();
  const hr=ed?ed.hour:nt();
  const q=ed?ed.quantity:"";
  const g=ed?ed.gasMeter:"";

  let h='<div class="card"><h2>'+(ed?"\u270F\uFE0F Redaguoti \u012Fra\u0161\u0105":"\u2795 Naujas \u012Fra\u0161as")+"</h2>";
  h+='<div class="fg"><div class="f df"><label>Data'+(ed?"":" <span class=\"at\">auto</span>")+'</label><input type="date" id="fd" value="'+dt+'"'+(ed?"":" class=\"af\"")+'></div>';
  h+='<div class="f"><label>Valanda'+(ed?"":" <span class=\"at\">auto</span>")+'</label><input type="time" id="fh" value="'+hr+'"'+(ed?"":" class=\"af\"")+'></div>';
  h+='<div class="f"><label>Darbuotojas'+(w&&!ed?" <span class=\"at\">auto</span>":"")+'</label><input type="text" id="fw" value="'+w+'" placeholder="Vardas"'+(w&&!ed?' class="af"':"")+'></div>';
  h+='<div class="f"><label>Kiekis, t</label><input type="number" inputmode="decimal" step="any" id="fq" value="'+q+'" placeholder="0"></div></div>';

  h+='<div class="slbl sg"><span class="si">\uD83D\uDD25</span> Dujos</div><div class="fg">';
  h+='<div class="f"><label>Duj\u0173 skaitiklis</label><input type="number" inputmode="decimal" step="any" id="fg" value="'+g+'" placeholder="0" oninput="ugd()"></div>';
  h+='<div class="calc" id="gdb" style="display:none"><span class="cl">Skirtumas</span><span class="cv" id="gdv">\u2014</span></div></div>';

  h+='<div class="slbl se"><span class="si">\u26A1</span> Elektra</div><div class="fg mg">';
  EL.forEach(m=>{h+='<div class="f"><label>'+m+'</label><input type="number" inputmode="decimal" step="any" id="fe'+m+'" value="'+(ed?ed["el"+m]:"")+'" placeholder="0"></div>'});
  h+="</div>";

  h+='<div class="slbl st"><span class="si">\uD83C\uDF21\uFE0F</span> Temperat\u016Bra</div><div class="fg">';
  h+='<div class="f"><label>D\u017Eiovykl\u0117s \u00B0C'+(dr&&!ed?' <span class="at">auto</span>':"")+'</label><input type="number" inputmode="decimal" step="any" id="fdr" value="'+dr+'"'+(dr&&!ed?' class="af"':"")+'></div>';
  h+='<div class="f"><label>Lauko \u00B0C'+(oT!==""&&!ed?' <span class="at">auto \xB7 Venta</span>':"")+'</label><input type="number" inputmode="decimal" step="any" id="fo" value="'+oT+'"'+(oT!==""&&!ed?' class="af"':"")+'></div></div>';

  h+='<button class="bsv'+(ed?" edit-mode":"")+'" onclick="hSave()" '+(S.saving?"disabled":"")+'>'+(S.saving?"\u23F3...":(ed?"\uD83D\uDCBE I\u0161saugoti pakeitimus":"\uD83D\uDCBE I\u0161saugoti"))+"</button>";
  if(ed)h+='<button class="bcan" onclick="S.editEntry=null;R()">Atšaukti redagavim\u0105</button>';
  return h+"</div>";
}

function ugd(){
  const gi=$("#fg");if(!gi)return;
  const last=S.entries.length>0?S.entries[S.entries.length-1]:null;if(!last)return;
  const d=df(gi.value,last.gasMeter),b=$("#gdb");
  if(d!==null){b.style.display="flex";$("#gdv").textContent=fm(d)}else{b.style.display="none"}
}

async function hSave(){
  const d={date:$("#fd").value,hour:$("#fh").value,worker:$("#fw").value,
    quantity:$("#fq").value,gasMeter:$("#fg").value,
    el480:$("#fe480").value,el380:$("#fe380").value,el183:$("#fe183").value,
    el184:$("#fe184").value,el182:$("#fe182").value,el181:$("#fe181").value,
    dryerTemp:$("#fdr").value,outdoorTemp:$("#fo").value};
  if(!d.date)return;
  if(S.editEntry){d.row=S.editEntry.row;d.gasPrice=S.editEntry.gasPrice;d.elPrice=S.editEntry.elPrice;await saveEdit(d)}
  else{await saveNew(d)}
}

// ── Table ──
function rTable(){
  const fi=filt(S.entries);
  const ps=[{k:"today",l:"\u0160iandien"},{k:"week",l:"Savait\u0117"},{k:"month",l:"M\u0117nuo"},{k:"lastmonth",l:"Pra\u0117j. m\u0117n."},{k:"year",l:"Metai"},{k:"lastyear",l:"Pra\u0117j. metai"},{k:"all",l:"Viskas"},{k:"custom",l:"Datos..."}];
  let h='<div class="fb">'+ps.map(p=>'<button class="fc '+(S.fl===p.k?"active":"")+'" onclick="S.fl=\''+p.k+"';R()\">"+p.l+"</button>").join("")+"</div>";
  if(S.fl==="custom")h+='<div class="cr"><span>Nuo</span><input type="date" value="'+S.ff+'" onchange="S.ff=this.value;R()"><span>Iki</span><input type="date" value="'+S.ft+'" onchange="S.ft=this.value;R()"></div>';
  if(!fi.length)return h+'<div class="es"><div class="icon">\uD83D\uDCED</div><p>N\u0117ra \u012Fra\u0161\u0173</p></div>';

  h+='<div class="tw"><div class="ts"><table><thead><tr><th class="sc">Data</th><th>Val.</th><th>Darb.</th><th>Kiekis</th><th>Duj\u0173</th><th>D.\u0394</th>';
  EL.forEach(m=>{h+="<th>"+m+"</th>"});
  h+="<th>D\u017E.\u00B0C</th><th>L.\u00B0C</th><th class=\"ac\"></th></tr></thead><tbody>";

  const imap=new Map();S.entries.forEach((e,i)=>imap.set(e,i));

  fi.forEach(e=>{
    const i=imap.get(e),prev=i>0?S.entries[i-1]:null,gd=prev?df(e.gasMeter,prev.gasMeter):null;
    h+='<tr><td class="sc">'+e.date+"</td><td>"+(e.hour||"\u2014")+'</td><td class="wc">'+(e.worker||"\u2014")+"</td>";
    h+="<td>"+fm(e.quantity)+"</td><td>"+fm(e.gasMeter)+'</td><td class="dc">'+fm(gd)+"</td>";
    EL.forEach(m=>{h+="<td>"+fm(e["el"+m])+"</td>"});
    h+="<td>"+fm(e.dryerTemp)+"</td><td>"+fm(e.outdoorTemp)+"</td>";
    h+='<td class="ac"><button class="bi" title="Redaguoti" onclick="startEdit('+i+')">\u270F\uFE0F</button><button class="bi" title="Trinti" onclick="deleteEntry('+e.row+')">\uD83D\uDDD1\uFE0F</button></td></tr>';
  });
  h+="</tbody></table></div></div>";

  // Summary
  if(fi.length>=1){
    const tQ=fi.reduce((s,e)=>s+(parseFloat(e.quantity)||0),0);
    let tG=0,tE=0;
    fi.forEach(e=>{const i=imap.get(e),prev=i>0?S.entries[i-1]:null;
      if(prev){const g=df(e.gasMeter,prev.gasMeter);if(g!==null)tG+=g;
        EL.forEach(m=>{const d=df(e["el"+m],prev["el"+m]);if(d!==null)tE+=d})}});

    // Use latest price from filtered entries, fallback to settings
    let gP=S.cfg.gp,eP=S.cfg.ep;
    for(let i=fi.length-1;i>=0;i--){
      if(fi[i].gasPrice){gP=parseFloat(fi[i].gasPrice)||gP;eP=parseFloat(fi[i].elPrice)||eP;break}
    }

    const gC=tG*gP,eC=tE*eP,tC=gC+eC;
    h+='<div class="card" style="margin-top:14px"><h2>\uD83D\uDCCA Suvestin\u0117 <span style="font-size:.7rem;color:var(--text-muted);font-weight:400">(duj\u0173 \u20AC'+gP.toFixed(2)+' / el. \u20AC'+eP.toFixed(3)+')</span></h2><div class="sgr">';
    h+='<div class="stt"><span class="sl">Pagaminta</span><span class="sv">'+tQ.toFixed(1)+' t</span></div>';
    h+='<div class="stt"><span class="sl">Duj\u0173 suv.</span><span class="sv">'+fm(Math.round(tG))+'</span></div>';
    h+='<div class="stt"><span class="sl">Duj\u0173 \u20AC</span><span class="sv">\u20AC'+gC.toFixed(2)+'</span></div>';
    h+='<div class="stt"><span class="sl">Elektra</span><span class="sv">'+fm(Math.round(tE))+' kWh</span></div>';
    h+='<div class="stt"><span class="sl">Elektros \u20AC</span><span class="sv">\u20AC'+eC.toFixed(2)+'</span></div>';
    h+='<div class="stt"><span class="sl">Viso \u20AC</span><span class="sv">\u20AC'+tC.toFixed(2)+'</span></div>';
    h+='<div class="stt"><span class="sl">\u20AC / t</span><span class="sv">'+(tQ>0?"\u20AC"+(tC/tQ).toFixed(2):"\u2014")+'</span></div>';
    h+='<div class="stt"><span class="sl">\u012Era\u0161\u0173</span><span class="sv">'+fi.length+'</span></div></div></div>';
  }
  h+='<div style="text-align:center;margin-top:14px"><button class="bt" onclick="load()">\uD83D\uDD04 Atnaujinti</button></div>';
  return h;
}

function startEdit(i){
  S.editEntry=S.entries[i];S.view="form";R();window.scrollTo({top:0,behavior:"smooth"});
}

// ── Settings ──
function rCfg(){
  const c=S.cfg;
  return'<div class="card"><h2>\u2699\uFE0F Nustatymai</h2>'
  +'<div class="slbl sg"><span class="si">\uD83D\uDD25</span> Duj\u0173 kaina</div>'
  +'<div class="fg"><div class="f"><label>\u20AC u\u017E vnt.</label><input type="number" step="0.01" id="cg" value="'+c.gp+'"></div></div>'
  +'<div class="slbl se"><span class="si">\u26A1</span> Elektros kaina</div>'
  +'<div class="fg"><div class="f"><label>\u20AC u\u017E kWh</label><input type="number" step="0.001" id="ce" value="'+c.ep+'"></div></div>'
  +'<div class="slbl ss"><span class="si">\uD83D\uDD17</span> Google Sheets</div>'
  +'<div class="f" style="margin-bottom:12px"><label>Script URL</label><input type="text" id="cu" value="'+S.url+'" style="font-family:var(--mono);font-size:.78rem"></div>'
  +'<button class="bss" onclick="sCfg()">\uD83D\uDCBE I\u0161saugoti</button>'
  +'<div style="text-align:center"><button class="bdc" onclick="reset()">\uD83D\uDDD1\uFE0F Atjungti Sheets</button></div></div>';
}

function sCfg(){
  S.cfg={gp:parseFloat($("#cg").value)||0,ep:parseFloat($("#ce").value)||0};
  localStorage.setItem("kv_cfg",JSON.stringify(S.cfg));
  const u=$("#cu").value.trim();if(u&&u!==S.url){S.url=u;localStorage.setItem("kv_url",u);load()}
  toast("\u2705 I\u0161saugota!");
}

function reset(){if(confirm("Atjungti?")){S.url="";S.entries=[];localStorage.removeItem("kv_url");R()}}

// ── Render ──
function R(){
  const a=$("#app");
  if(!S.url){a.innerHTML=rSetup();return}
  let h='<div class="app"><div class="header"><div class="header-left"><h1>KALK V Gamyba</h1><div class="sub">UAB Mortar Akmen\u0117</div></div><div class="badge"><div class="dot"></div>Sheets</div></div>';
  h+='<div class="nav"><button class="'+(S.view==="form"?"active":"")+'" onclick="S.view=\'form\';R()">\u270F\uFE0F \u012Evedimas</button>';
  h+='<button class="'+(S.view==="table"?"active":"")+'" onclick="S.view=\'table\';R()">\uD83D\uDCCB Duomenys</button>';
  h+='<button class="'+(S.view==="settings"?"active":"")+'" onclick="S.view=\'settings\';R()">\u2699\uFE0F Nust.</button></div>';
  if(S.view==="form")h+=rForm();
  if(S.view==="table")h+=rTable();
  if(S.view==="settings")h+=rCfg();
  a.innerHTML=h+"</div>";
}

R();if(S.url)load();getWeather().then(()=>{if(S.view==="form")R()});
</script>
</body>
</html>
